services:
  db:
    image: postgres:16-alpine
    container_name: pqr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pqr_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pqr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pqr_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pqr_postgres_data:
